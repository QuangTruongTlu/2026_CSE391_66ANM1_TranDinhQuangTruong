<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 40px; display: flex; justify-content: center; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 450px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 18px; position: relative; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; }
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"] {
            width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26,115,232,0.2); }
        
        /* Trạng thái lỗi */
        .error-input { border-color: #d93025 !important; background-color: #fff8f7; }
        .error-text { color: #d93025; font-size: 12px; margin-top: 4px; min-height: 15px; }
        
        .radio-group, .checkbox-group { display: flex; gap: 15px; align-items: center; }
        .btn-submit { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background: #1557b0; }

        /* Thông báo thành công */
        #success-msg { display: none; text-align: center; padding: 40px; }
        #success-msg h1 { color: #1e8e3e; }
    </style>
</head>
<body>

    <div class="form-card" id="registration-form">
        <h2>ĐĂNG KÝ HỘI VIÊN</h2>
        <form id="main-form" novalidate>
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nguyễn Văn A">
                <div class="error-text" id="err-fullname"></div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@gmail.com">
                <div class="error-text" id="err-email"></div>
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="tel" id="phone" placeholder="0xxxxxxxxx">
                <div class="error-text" id="err-phone"></div>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, 1 hoa, 1 thường, 1 số">
                <div class="error-text" id="err-password"></div>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword">
                <div class="error-text" id="err-confirmPassword"></div>
            </div>

            <div class="form-group">
                <label>Giới tính</label>
                <div class="radio-group">
                    <label style="font-weight: normal;"><input type="radio" name="gender" value="Nam"> Nam</label>
                    <label style="font-weight: normal;"><input type="radio" name="gender" value="Nữ"> Nữ</label>
                </div>
                <div class="error-text" id="err-gender"></div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="terms">
                    <label for="terms" style="margin:0; font-weight: normal;">Tôi đồng ý với điều khoản</label>
                </div>
                <div class="error-text" id="err-terms"></div>
            </div>

            <button type="submit" class="btn-submit">ĐĂNG KÝ NGAY</button>
        </form>
    </div>

    <div id="success-msg" class="form-card">
        <h1>Đăng ký thành công! 🎉</h1>
        <p>Chào mừng thành viên mới: <strong id="user-display"></strong></p>
        <button onclick="location.reload()" style="background:none; border:none; color: blue; cursor:pointer; text-decoration: underline;">Trở lại</button>
    </div>

    <script>
        const form = document.getElementById('main-form');
        const fields = ['fullname', 'email', 'phone', 'password', 'confirmPassword', 'terms'];

        // --- HÀM TIỆN ÍCH ---
        function showError(id, message) {
            const element = document.getElementById(id);
            const errorDiv = document.getElementById(`err-${id}`);
            if(element.type !== 'checkbox') element.classList.add('error-input');
            errorDiv.textContent = message;
        }

        function clearError(id) {
            const element = document.getElementById(id);
            const errorDiv = document.getElementById(`err-${id}`);
            element.classList.remove('error-input');
            errorDiv.textContent = "";
        }

        // --- CÁC HÀM VALIDATE RIÊNG BIỆT ---
        function validateFullname() {
            const val = document.getElementById('fullname').value.trim();
            const regex = /^[a-zA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚĂĐĨŨƠàáâãèéêìíòóôõùúăđĩũơƯĂẠẢẤẦẨẪẬẮẰẲẴẶẸẺẼỀỀỂưăạảấầẩẫậắằẳẵặẹẻẽềềểỄỆỈỊỌỎỐỒỔỖỘỚỜỞỠỢỤỦỨỪỬỮỰYỲỴÝỶỸửữựỳỵỷỹ\s]{3,}$/;
            if (!val) { showError('fullname', 'Họ tên không được để trống'); return false; }
            if (!regex.test(val)) { showError('fullname', 'Họ tên ít nhất 3 ký tự và chỉ chứa chữ cái'); return false; }
            clearError('fullname'); return true;
        }

        function validateEmail() {
            const val = document.getElementById('email').value.trim();
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!val) { showError('email', 'Email không được để trống'); return false; }
            if (!regex.test(val)) { showError('email', 'Email không đúng định dạng (name@domain.com)'); return false; }
            clearError('email'); return true;
        }

        function validatePhone() {
            const val = document.getElementById('phone').value.trim();
            const regex = /^0\d{9}$/;
            if (!val) { showError('phone', 'Số điện thoại không được để trống'); return false; }
            if (!regex.test(val)) { showError('phone', 'SĐT phải có 10 số và bắt đầu bằng số 0'); return false; }
            clearError('phone'); return true;
        }

        function validatePassword() {
            const val = document.getElementById('password').value;
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!val) { showError('password', 'Mật khẩu không được để trống'); return false; }
            if (!regex.test(val)) { showError('password', 'Tối thiểu 8 ký tự, gồm chữ hoa, chữ thường và số'); return false; }
            clearError('password'); return true;
        }

        function validateConfirm() {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!confirm) { showError('confirmPassword', 'Vui lòng xác nhận mật khẩu'); return false; }
            if (pass !== confirm) { showError('confirmPassword', 'Mật khẩu xác nhận không khớp'); return false; }
            clearError('confirmPassword'); return true;
        }

        function validateGender() {
            const genders = document.getElementsByName('gender');
            let checked = false;
            for (const g of genders) { if (g.checked) checked = true; }
            if (!checked) { showError('gender', 'Vui lòng chọn giới tính'); return false; }
            clearError('gender'); return true;
        }

        function validateTerms() {
            const checked = document.getElementById('terms').checked;
            if (!checked) { showError('terms', 'Bạn phải đồng ý với điều khoản'); return false; }
            clearError('terms'); return true;
        }

        // --- GÁN SỰ KIỆN ---

        // 1. Validate Realtime (Blur)
        document.getElementById('fullname').addEventListener('blur', validateFullname);
        document.getElementById('email').addEventListener('blur', validateEmail);
        document.getElementById('phone').addEventListener('blur', validatePhone);
        document.getElementById('password').addEventListener('blur', validatePassword);
        document.getElementById('confirmPassword').addEventListener('blur', validateConfirm);

        // 2. Xóa lỗi khi gõ (Input)
        fields.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', () => clearError(id));
        });

        // 3. Xử lý Submit
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Sử dụng toán tử & để ép buộc gọi tất cả các hàm validate
            const isFullnameValid = validateFullname();
            const isEmailValid = validateEmail();
            const isPhoneValid = validatePhone();
            const isPasswordValid = validatePassword();
            const isConfirmValid = validateConfirm();
            const isGenderValid = validateGender();
            const isTermsValid = validateTerms();

            const isFormValid = isFullnameValid & isEmailValid & isPhoneValid & isPasswordValid & isConfirmValid & isGenderValid & isTermsValid;

            if (isFormValid) {
                const name = document.getElementById('fullname').value;
                document.getElementById('registration-form').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('user-display').textContent = name;
            }
        });

    </script>
</body>
</html>
